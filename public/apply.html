<div class="page">
  <h1>Apply to Join Dragon Horizons</h1>
  <p>Dragon Horizons is a private server. Submit an application below and we'll review it within 1-3 days.</p>
  <div style="margin: 30px 0;">
    <form style="max-width: 500px;">
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Nickname / Real Name *</label>
        <input type="text" placeholder="What do we call you?" style="width: 100%; padding: 10px; background: rgba(10,6,6,.8); border: 1px solid rgba(212,168,83,.2); color: var(--parch);" required>
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Discord Tag *</label>
        <input type="text" placeholder="yourname or user#0000" style="width: 100%; padding: 10px; background: rgba(10,6,6,.8); border: 1px solid rgba(212,168,83,.2); color: var(--parch);" required>
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Aternos Username *</label>
        <input type="text" placeholder="Your exact Aternos username" style="width: 100%; padding: 10px; background: rgba(10,6,6,.8); border: 1px solid rgba(212,168,83,.2); color: var(--parch);" required>
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Why do you want to join? *</label>
        <textarea placeholder="Tell us about yourself..." style="width: 100%; padding: 10px; background: rgba(10,6,6,.8); border: 1px solid rgba(212,168,83,.2); color: var(--parch); min-height: 120px;" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Application</button>
    </form>
  </div>
</div>

<footer style="text-align: center; padding: 40px 20px; color: var(--parch-d); border-top: 1px solid var(--border);">
