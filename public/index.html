.hero {

  position: relative; z-index: 1;
}
.hero::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    -45deg,
    rgba(212,168,83,.012) 0px, rgba(212,168,83,.012) 1px,
    transparent 1px, transparent 60px
  );
  pointer-events: none;
}
.hero-glyph {
  font-family: var(--fc); font-size: .6rem; letter-spacing: .6em; text-transform: uppercase;
  color: var(--ember); margin-bottom: 24px;
  display: flex; align-items: center; gap: 20px; justify-content: center;
}
.hero-glyph::before, .hero-glyph::after {
  content: ''; width: 50px; height: 1px;
}
.hero-glyph::before { background: linear-gradient(90deg, transparent, var(--ember)); }
.hero-glyph::after  { background: linear-gradient(90deg, var(--ember), transparent); }
</style>
</head>
